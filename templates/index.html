<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepFake Image Detector</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <div class="bg-animated">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <nav class="navbar glass">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        style="color:var(--accent-cyan);">
        <path d="M2 12h4l2-9 5 18 3-10h6" />
      </svg>
      DeepImage Classifier
    </div>
    <div class="nav-links glass">
      <a href="/" class="active">Home</a>
      <a href="/predict">Predict</a>
      <a href="/train">Retrain</a>
    </div>
  </nav>

  <main class="hero">
    <div class="card glass">
      <h1>Detect DeepFakes<br>in Seconds</h1>
      <p class="muted">Advanced CNN model to detect manipulated images. Upload any image and get instant predictions
        with confidence scores.</p>

      <div class="actions">
        <a class="btn btn-primary" href="/predict">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          Try Prediction
        </a>
        <a class="btn btn-ghost" href="/train">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20" />
            <path d="m17 7-5-5-5 5" />
            <path d="m17 17-5 5-5-5" />
          </svg>
          Train Model
        </a>
      </div>
    </div>
  </main>

  <footer class="footer">&copy; 2026 DeepFake Detector • AI-Powered Image Authentication</footer>

  <script>
    // Highlight active nav link is handled by server or statically, but we can keep the JS
    document.querySelectorAll('.nav-links a').forEach(link => {
      if (link.href === window.location.href) {
        document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      }
    });
  </script>
</body>

</html>
